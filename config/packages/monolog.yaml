monolog:
    channels:
        - deprecation
    handlers:
        # Suppress deprecation warnings from dependencies in production
        # These are not actionable and should not be logged to stderr
        null_deprecation:
            type: null
            channels: ["deprecation"]
        prod-signaler:
            type: fingers_crossed
            action_level: ERROR
            passthru_level: INFO # this means that all message of level INFO or higher are always logged
            channels: [ "!event", "!deprecation" ]
            handler: main_syslog
            bubble: false # if we handle it, nothing else should
        main_syslog:
            type: stream
            path: "php://stderr"
            formatter: surfnet_stepup.monolog.json_formatter
            channels: [ "!event", "!deprecation" ]

when@dev:
    monolog:
        handlers:
            main_syslog:
                type: stream
                path: php://stderr
                level: error
                channels: ["!event", "!doctrine", "!console"]
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!console"]
when@test:
    monolog:
        handlers:
            main_syslog:
                type: stream
                path: php://stderr
                level: error
                channels: ["!event", "!doctrine", "!deprecation", "!console"]
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!deprecation", "!console"]
